<div class="map-wrapper" [style.height]="height">

  <!-- Sci-fi overlays -->
  <div class="map-scanline"></div>
  <div class="map-vignette"></div>

  @if (interactive) {
    <div class="map-hud">
      <div class="hud-chip" [class.active]="selectingFrom()">
        <span class="hud-dot hud-dot--from"></span>
        Click to set start
      </div>
      <div class="hud-chip" [class.active]="!selectingFrom()">
        <span class="hud-dot hud-dot--to"></span>
        Click to set destination
      </div>
    </div>
  }

  <!-- Leaflet map -->
  <div #mapContainer class="map-canvas"></div>

  <!-- Corner brackets -->
  <div class="corner corner--tl"></div>
  <div class="corner corner--tr"></div>
  <div class="corner corner--bl"></div>
  <div class="corner corner--br"></div>

  <!-- Top/bottom neon edge lines -->
  <div class="edge-glow edge-glow--top"></div>
  <div class="edge-glow edge-glow--bottom"></div>

</div>
