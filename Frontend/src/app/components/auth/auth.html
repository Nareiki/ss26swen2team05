<div class="auth-page">
  <!-- Candlelight background -->
  <div class="auth-bg">
    <div class="parchment-grain"></div>
    <div class="candle-glow candle-glow--top"></div>
    <div class="candle-glow candle-glow--bottom"></div>
    <div class="ink-flourish"></div>
  </div>

  <div class="auth-container" [class.flipped]="isRegisterMode">

    <!-- Header -->
    <div class="auth-header">
      <div class="auth-logo">
        <svg class="logo-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Compass rose style icon -->
          <circle cx="20" cy="20" r="16" stroke="var(--brass)" stroke-width="1.2" fill="none"/>
          <circle cx="20" cy="20" r="12" stroke="var(--brass)" stroke-width="0.5" opacity="0.4" fill="none"/>
          <path d="M20 4 L22 20 L20 36 L18 20 Z" fill="var(--brass)" opacity="0.9"/>
          <path d="M4 20 L20 18 L36 20 L20 22 Z" fill="var(--brass)" opacity="0.6"/>
          <circle cx="20" cy="20" r="2" fill="var(--ruby)"/>
        </svg>
        <h1 class="logo-text">Tour Planner</h1>
      </div>
      <p class="auth-subtitle">{{ isRegisterMode ? 'Forge a new explorer\'s record' : 'Sign in to your atlas' }}</p>
    </div>

    <!-- Mode Toggle -->
    <div class="mode-toggle">
      <button
        class="toggle-btn"
        [class.active]="!isRegisterMode"
        (click)="isRegisterMode = false; errorMessage = ''">
        Login
      </button>
      <button
        class="toggle-btn"
        [class.active]="isRegisterMode"
        (click)="isRegisterMode = true; errorMessage = ''">
        Register
      </button>
      <div class="toggle-indicator" [class.right]="isRegisterMode"></div>
    </div>

    <!-- Login Form -->
    @if (!isRegisterMode) {
      <form (ngSubmit)="onLogin()" class="auth-form animate-fade-in">
        <div class="form-group">
          <label for="login-user">Username</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 20 20" fill="currentColor">
              <path d="M10 10a4 4 0 100-8 4 4 0 000 8zm-7 8a7 7 0 0114 0H3z"/>
            </svg>
            <input
              id="login-user"
              type="text"
              placeholder="Enter username"
              [(ngModel)]="loginUsername"
              name="loginUsername"
              required
              autocomplete="username"/>
          </div>
        </div>

        <div class="form-group">
          <label for="login-pass">Password</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/>
            </svg>
            <input
              id="login-pass"
              type="password"
              placeholder="Enter password"
              [(ngModel)]="loginPassword"
              name="loginPassword"
              required
              autocomplete="current-password"/>
          </div>
        </div>

        @if (errorMessage) {
          <div class="error-message">
            <svg viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
            </svg>
            {{ errorMessage }}
          </div>
        }

        <button type="submit" class="btn btn--primary btn--full">
          <span>Sign In</span>
          <svg class="btn-arrow" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd"/>
          </svg>
        </button>
      </form>
    }

    <!-- Register Form -->
    @if (isRegisterMode) {
      <form (ngSubmit)="onRegister()" class="auth-form animate-fade-in">
        <div class="form-group">
          <label for="reg-user">Username</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 20 20" fill="currentColor">
              <path d="M10 10a4 4 0 100-8 4 4 0 000 8zm-7 8a7 7 0 0114 0H3z"/>
            </svg>
            <input
              id="reg-user"
              type="text"
              placeholder="Choose a username"
              [(ngModel)]="registerUsername"
              name="registerUsername"
              required
              autocomplete="username"/>
          </div>
        </div>

        <div class="form-group">
          <label for="reg-pass">Password</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/>
            </svg>
            <input
              id="reg-pass"
              type="password"
              placeholder="Create a password"
              [(ngModel)]="registerPassword"
              name="registerPassword"
              required
              autocomplete="new-password"/>
          </div>
        </div>

        <div class="form-group">
          <label for="reg-pass-confirm">Confirm Password</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5C18.577 6.443 19 8.073 19 9.8c0 5.523-4.477 10-10 10S-1 15.323-1 9.8c0-1.727.423-3.357 1.166-4.8z" clip-rule="evenodd"/>
            </svg>
            <input
              id="reg-pass-confirm"
              type="password"
              placeholder="Repeat password"
              [(ngModel)]="registerPasswordConfirm"
              name="registerPasswordConfirm"
              required
              autocomplete="new-password"/>
          </div>
        </div>

        @if (errorMessage) {
          <div class="error-message">
            <svg viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
            </svg>
            {{ errorMessage }}
          </div>
        }

        @if (successMessage) {
          <div class="success-message">
            <svg viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
            </svg>
            {{ successMessage }}
          </div>
        }

        <button type="submit" class="btn btn--primary btn--full">
          <span>Create Account</span>
          <svg class="btn-arrow" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd"/>
          </svg>
        </button>
      </form>
    }

    <!-- Popup -->
    @if (showPopup) {
      <app-popup
        title="Success!"
        message="Registration successful! Redirecting to login..."
        confirmText="OK"
        (confirmed)="onPopupConfirm()">
      </app-popup>
    }

  </div>
</div>
