<div class="dashboard">

  <header class="topbar">
    <div class="topbar-left">
      <svg class="logo-icon" viewBox="0 0 40 40" fill="none">
        <circle cx="20" cy="20" r="16" stroke="var(--brass)" stroke-width="1.2" fill="none"/>
        <circle cx="20" cy="20" r="12" stroke="var(--brass)" stroke-width="0.5" opacity="0.4" fill="none"/>
        <path d="M20 4 L22 20 L20 36 L18 20 Z" fill="var(--brass)" opacity="0.9"/>
        <path d="M4 20 L20 18 L36 20 L20 22 Z" fill="var(--brass)" opacity="0.6"/>
        <circle cx="20" cy="20" r="2" fill="var(--ruby)"/>
      </svg>
      <span class="logo-text">Tour Planner</span>
    </div>
    <div class="topbar-right">
      <button class="topbar-btn" (click)="onLogout()">Logout</button>
    </div>
  </header>

  <!-- Main area: list + map (shrinks when drawer opens) -->
  <div class="workspace">

    <aside class="sidebar">
      <app-tour-list
        [tours]="tours()"
        (tourSelected)="onTourSelected($event)"
        (tourCreate)="onTourCreate()"
        (tourEdit)="onTourEdit($event)"
        (tourDelete)="onTourDelete($event)">
      </app-tour-list>
    </aside>

    <section class="panel-map">
      <app-map-display
        [from]="mapFrom()"
        [to]="mapTo()"
        [routeGeoJson]="mapRouteGeoJson()"
        [interactive]="isMapInteractive()"
        (fromSelected)="onMapFromSelected($event)"
        (toSelected)="onMapToSelected($event)"
        height="100%">
      </app-map-display>
    </section>

  </div>

  <!-- Bottom panel: in-flow, pushes map up instead of overlaying -->
  @if (showDrawer()) {
    <div class="bottom-panel">
      <div class="bottom-panel-bar">
        <button class="bottom-close" (click)="closeDrawer()" title="Close panel">
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M5 12l5-5 5 5"/>
          </svg>
          <span>Close</span>
        </button>
      </div>

      <div class="bottom-content">
        @switch (bottomPanel()) {

          @case ('tour-form') {
            <app-tour-form
              [tour]="editingTour()"
              [userId]="currentUserId()"
              (tourSaved)="onTourFormSave($event)"
              (cancel)="onTourFormCancel()">
            </app-tour-form>
          }

          @case ('log-form') {
            <app-tour-log-form
              [log]="editingLog()"
              [tourId]="logFormTourId()"
              (logSaved)="onLogFormSave($event)"
              (cancel)="onLogFormCancel()">
            </app-tour-log-form>
          }

          @default {
            <app-tour-detail
              [tour]="selectedTour()"
              [logs]="selectedTourLogs()"
              (editTour)="onTourEdit($event)"
              (deleteTour)="onTourDelete($event)"
              (exportTour)="onExportTour($event)"
              (addLog)="onAddLog($event)"
              (editLog)="onEditLog($event)"
              (deleteLog)="onDeleteLog($event)">
            </app-tour-detail>
          }

        }
      </div>
    </div>
  }

</div>
