<div class="dashboard">

  <header class="topbar">
    <div class="topbar-left">
      <svg class="logo-icon" viewBox="0 0 40 40" fill="none">
        <path d="M20 4L36 12V28L20 36L4 28V12L20 4Z" stroke="var(--cyan-400)" stroke-width="1.5"/>
        <circle cx="20" cy="20" r="4" fill="var(--cyan-400)" opacity="0.8"/>
      </svg>
      <span class="logo-text">Tour Planner</span>
    </div>
    <div class="topbar-right">
      <button class="topbar-btn" (click)="onLogout()">Logout</button>
    </div>
  </header>

  <div class="workspace">

    <!-- Left: Tour List -->
    <aside class="sidebar">
      <app-tour-list
        [tours]="tours()"
        (tourSelected)="onTourSelected($event)"
        (tourCreate)="onTourCreate()"
        (tourEdit)="onTourEdit($event)"
        (tourDelete)="onTourDelete($event)">
      </app-tour-list>
    </aside>

    <!-- Center: Map (interactive when form is open) -->
    <section class="panel-map">
      <app-map-display
        [from]="mapFrom()"
        [to]="mapTo()"
        [routeGeoJson]="mapRouteGeoJson()"
        [interactive]="showForm()"
        (fromSelected)="onMapFromSelected($event)"
        (toSelected)="onMapToSelected($event)"
        height="100%">
      </app-map-display>
    </section>

    <!-- Right: Detail OR Form -->
    <aside class="panel-detail">
      @if (showForm()) {
        <app-tour-form
          [tour]="editingTour()"
          [userId]="currentUserId()"
          (tourSaved)="onFormSave($event)"
          (cancel)="onFormCancel()">
        </app-tour-form>
      } @else {
        <app-tour-detail
          [tour]="selectedTour()"
          [logs]="selectedTourLogs()"
          (editTour)="onTourEdit($event)"
          (deleteTour)="onTourDelete($event)"
          (exportTour)="onExportTour($event)"
          (addLog)="onAddLog($event)"
          (editLog)="onEditLog($event)"
          (deleteLog)="onDeleteLog($event)">
        </app-tour-detail>
      }
    </aside>

  </div>

</div>
